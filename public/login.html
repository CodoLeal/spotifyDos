<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Spotify2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: Arial, sans-serif; }
        .card-login { background-color: #1c1c1c; border: none; border-radius: 8px; }
        .btn-spotify { background-color: #1DB954; color: white; font-weight: bold; border-radius: 50px; }
        .btn-spotify:hover { background-color: #1ed760; color: white; }
    </style>
</head>
<body class="d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card card-login p-4 shadow-lg">
                    
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Spotify<span style="color: #1DB954;">2</span></h2>
                        <p class="text-muted small">Iniciar sesión en el Panel de Administración</p>
                    </div>

                    <div id="mensajeError"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label small fw-bold text-secondary">Correo electrónico</label>
                            <input type="email" class="form-control bg-dark text-white border-secondary" id="email" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label small fw-bold text-secondary">Contraseña</label>
                            <input type="password" class="form-control bg-dark text-white border-secondary" id="password" required>
                        </div>

                        <button type="submit" class="btn btn-spotify w-100 py-2">Iniciar Sesión</button>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
