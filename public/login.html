<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Spotify2</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card card-login p-4 shadow-lg">
                    
                    <div class="text-center mb-5">
                        <h2 class="fw-bold">Spotify<span>2</span></h2>
                    </div>

                    <form id="loginForm">
                        
                        <div id="mensaje-error" class="alert alert-danger d-none small py-2 text-center" role="alert"></div>
                        
                        <div class="mb-3">
                            <label for="username" class="form-label small fw-bold text-secondary">Nombre de usuario</label>
                            <input type="text" name="username" class="form-control bg-dark text-white border-secondary" id="username" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label small fw-bold text-secondary">Contraseña</label>
                            <input type="password" name="password" class="form-control bg-dark text-white border-secondary" id="password" required>
                        </div>

                        <button type="submit" class="btn btn-spotify w-100 py-2 mt-2">Iniciar Sesión</button>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
