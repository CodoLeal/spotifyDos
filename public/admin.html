<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify 2 - Panel de Administración</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <nav class="navbar fixed-top px-4">
        <a class="navbar-brand text-white fw-bold" href="/">
            <i class="bi bi-music-note-beamed me-1"></i>Spotify<span class="glowbacan">2</span>
        </a>
        <div class="d-flex gap-2">
            <span class="navbar-text text-secondary me-2 d-none d-md-inline">
                <i class="bi bi-person-circle me-1 text-white"></i> Modo Administrador
            </span>
            <a href="/" class="btn btn-outline-light btn-sm rounded-pill px-3">
                <i class="bi bi-box-arrow-left me-1"></i>Salir al Inicio
            </a>
        </div>
    </nav>

    <div class="container contenido-principal">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-white mb-1">Gestión del Catálogo</h2>
                <p class="text-secondary mb-0" style="font-size: 0.9rem;">Agrega, edita o elimina las canciones del sistema.</p>
            </div>
            <button class="btn btn-spotify px-4 py-2" data-bs-toggle="modal" data-bs-target="#modalAgregar">
                <i class="bi bi-plus-circle-fill me-2"></i>Añadir Canción
            </button>
        </div>

        <div class="card card-admin p-4 shadow-lg mb-5">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr class="text-secondary" style="font-size: 0.9rem;">
                            <th>ID</th>
                            <th>Título</th>
                            <th>Artista</th>
                            <th>Álbum</th>
                            <th>Duración</th>
                            <th>Género</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-canciones" style="font-size: 0.95rem;">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAgregar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold"><i class="bi bi-disc-fill text-primary me-2"></i>Nueva Canción</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="form-agregar">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Título de la Canción</label>
                            <input type="text" name="titulo" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Artista / Banda</label>
                            <input type="text" name="artista" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Álbum</label>
                            <input type="text" name="album" class="form-control" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Duración</label>
                                <input type="text" name="duracion" class="form-control" placeholder="Ej: 3:45" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Género</label>
                                <input type="text" name="genero" class="form-control" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-spotify px-4">Guardar Canción</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-warning"><i class="bi bi-pencil-square me-2"></i>Modificar Canción</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="form-editar">
                    <div class="modal-body">
                        <input type="hidden" id="editar-id">
                        <div class="mb-3">
                            <label class="form-label">Título de la Canción</label>
                            <input type="text" id="editar-titulo" name="titulo" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Artista / Banda</label>
                            <input type="text" id="editar-artista" name="artista" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Álbum</label>
                            <input type="text" id="editar-album" name="album" class="form-control" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Duración</label>
                                <input type="text" id="editar-duracion" name="duracion" class="form-control" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Género</label>
                                <input type="text" id="editar-genero" name="genero" class="form-control" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-warning text-dark fw-bold rounded-pill px-4">Actualizar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/global.js"></script>
    <script src="/js/admin.js"></script>
</body>

</html>
